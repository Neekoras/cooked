<!DOCTYPE html>
<html>
<head>
  <title>Cooked Script Test</title>
</head>
<body>
  <h1>Click the green button</h1>

  <script>
    var btn = document.createElement('button');
    btn.id = 'test-btn';
    btn.textContent = 'CLICK ME';
    btn.style.cssText = 'position:fixed;top:10px;right:10px;z-index:9999;background:green;color:white;padding:20px;font-size:20px;cursor:pointer;border:none;';
    document.body.appendChild(btn);

    btn.addEventListener('click', function() {
      btn.textContent = 'IT WORKS';
      btn.style.background = 'red';
    });

    console.log('Script ran, button appended:', btn);
  </script>
</body>
</html>
